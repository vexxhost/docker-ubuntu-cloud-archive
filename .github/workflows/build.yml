name: build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - stable/**

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      pull-requests: write
    steps:
      - uses: vexxhost/docker-atmosphere/.github/actions/build-image@2b0040e59869e408a94f1e92e67fa47035c50336 # main
        with:
          image-name: ubuntu-cloud-archive
          push: ${{ github.event_name != 'pull_request' }}
